<!DOCTYPE html>
<html>
<head>
<title>Snake Master Pro</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
background:#000;
border:4px solid lime;
}

button{
padding:10px;
margin:5px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.touch button{
width:60px;
height:50px;
}

</style>
</head>

<body>

<h1>🐍 Snake Master Pro</h1>

<h2>
Score: <span id="score">0</span><br>
💰 Coins: <span id="coins">0</span><br>
🏆 High Score: <span id="high">0</span>
</h2>

<button onclick="start()">START</button>

<br>

Choose Skin:
<button onclick="skin='lime'">🟢</button>
<button onclick="skin='yellow'">🟡</button>
<button onclick="skin='cyan'">🔵</button>

<br><br>

<canvas id="game" width="400" height="400"></canvas>


<div class="touch">

<br>
<button onclick="move(0,-20)">⬆️</button>
<br>
<button onclick="move(-20,0)">⬅️</button>
<button onclick="move(0,20)">⬇️</button>
<button onclick="move(20,0)">➡️</button>

</div>


<h2>🏆 Leaderboard</h2>
<div id="board"></div>


<script>

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let snake;
let food;
let dx;
let dy;
let score;
let coins;
let game;

let skin="lime";

let high=localStorage.getItem("high")||0;
document.getElementById("high").innerHTML=high;


let totalCoins=localStorage.getItem("coins")||0;
document.getElementById("coins").innerHTML=totalCoins;



// SOUND

function sound(){

let a=new AudioContext();
let o=a.createOscillator();

o.connect(a.destination);
o.start();
o.stop(a.currentTime+.1);

}



// START

function start(){

snake=[
{x:200,y:200}
];

food={
x:100,
y:100
};

dx=20;
dy=0;

score=0;

document.getElementById("score").innerHTML=0;

clearInterval(game);

game=setInterval(loop,100);

}




function loop(){

ctx.fillStyle="black";
ctx.fillRect(0,0,400,400);


// food

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);


// move

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};

snake.unshift(head);


// eat

if(head.x==food.x && head.y==food.y){

score++;

coins=Number(totalCoins)+1;

totalCoins=coins;

localStorage.setItem("coins",coins);

document.getElementById("coins").innerHTML=coins;

document.getElementById("score").innerHTML=score;

sound();


food.x=Math.floor(Math.random()*20)*20;
food.y=Math.floor(Math.random()*20)*20;


}else{

snake.pop();

}



// draw snake

ctx.fillStyle=skin;

snake.forEach(p=>{

ctx.fillRect(
p.x,
p.y,
20,
20
);

});



// game over

if(
head.x<0||
head.y<0||
head.x>=400||
head.y>=400
){

clearInterval(game);

saveScore();

alert("Game Over Score: "+score);

}

}




function move(x,y){

if(dx+x!=0 || dy+y!=0){

dx=x;
dy=y;

}

}




document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp")
move(0,-20);

if(e.key=="ArrowDown")
move(0,20);

if(e.key=="ArrowLeft")
move(-20,0);

if(e.key=="ArrowRight")
move(20,0);

});




// LEADERBOARD

function saveScore(){

let scores=
JSON.parse(localStorage.getItem("scores")||"[]");

scores.push(score);

scores.sort((a,b)=>b-a);

scores=scores.slice(0,5);

localStorage.setItem(
"scores",
JSON.stringify(scores)
);


if(score>high){

high=score;

localStorage.setItem("high",high);

}

showBoard();

}


function showBoard(){

let scores=
JSON.parse(localStorage.getItem("scores")||"[]");

document.getElementById("board").innerHTML=
scores.map((x,i)=>
(i+1)+". "+x
).join("<br>");

}

showBoard();


</script>

</body>
</html>
