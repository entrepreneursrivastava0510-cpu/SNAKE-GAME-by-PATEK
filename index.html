<!DOCTYPE html>
<html>
<head>
<title>Snake Master by PATEK</title>

<style>
body{
    margin:0;
    text-align:center;
    background:#111;
    color:white;
    font-family:Arial;
}

h1{
    color:#00ff66;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00ff66;
}

canvas{
    background:#000;
    border:4px solid #00ff66;
    margin-top:20px;
}
</style>

</head>

<body>

<h1>🐍 Snake Master</h1>

<h2>
Score: <span id="score">0</span>
<br>
High Score: <span id="high">0</span>
</h2>

<button onclick="startGame()">START GAME</button>

<br>

<canvas id="game" width="400" height="400"></canvas>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let snake;
let food;
let dx;
let dy;
let score;
let speed;
let game;


let highScore = localStorage.getItem("highscore") || 0;
document.getElementById("high").innerHTML=highScore;


function startGame(){

snake=[
{x:200,y:200}
];

food={
x:100,
y:100
};

dx=20;
dy=0;
score=0;
speed=120;

document.getElementById("score").innerHTML=score;

clearInterval(game);

game=setInterval(loop,speed);

}



function loop(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,400,400);


// food

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,20,20);


// snake move

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};

snake.unshift(head);


// eat

if(head.x===food.x && head.y===food.y){

score++;

document.getElementById("score").innerHTML=score;


if(score>highScore){

highScore=score;
localStorage.setItem("highscore",highScore);
document.getElementById("high").innerHTML=highScore;

}


food.x=Math.floor(Math.random()*20)*20;
food.y=Math.floor(Math.random()*20)*20;


// faster

if(speed>50){

speed-=5;
clearInterval(game);
game=setInterval(loop,speed);

}


}else{

snake.pop();

}


// draw snake

ctx.fillStyle="#00ff66";

snake.forEach(part=>{

ctx.fillRect(part.x,part.y,20,20);

});



// wall collision

if(
head.x<0 ||
head.x>=400 ||
head.y<0 ||
head.y>=400
){

alert("Game Over! Score: "+score);

clearInterval(game);

}

}




document.addEventListener("keydown",e=>{


if(e.key==="ArrowUp" && dy===0){

dx=0;
dy=-20;

}


if(e.key==="ArrowDown" && dy===0){

dx=0;
dy=20;

}


if(e.key==="ArrowLeft" && dx===0){

dx=-20;
dy=0;

}


if(e.key==="ArrowRight" && dx===0){

dx=20;
dy=0;

}


});


</script>

</body>
</html>
